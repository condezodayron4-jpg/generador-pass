<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background: #000; color: #fff; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 10px;
        }
        /* Aumentamos el ancho al 95% de la pantalla para que no se vea pequeño */
        .box { 
            width: 100%; max-width: 450px; background: #111; 
            border: 1px solid #333; padding: 30px; border-radius: 15px;
            box-sizing: border-box;
        }
        h2 { text-align: center; font-size: 24px; margin-bottom: 25px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        
        /* Botones grandes para facilitar el toque */
        .btn-pm { 
            background: #222; color: #fff; border: 1px solid #444; 
            width: 55px; height: 55px; cursor: pointer; 
            font-size: 24px; font-weight: bold; border-radius: 5px;
        }
        .val { 
            background: #000; width: 90px; height: 55px; line-height: 55px; 
            text-align: center; border: 1px solid #444; font-weight: bold; font-size: 22px;
        }
        .gen-btn { 
            background: #080; width: 100%; padding: 20px; border: none; 
            color: #fff; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 18px;
        }
        .historial { height: 250px; overflow-y: scroll; margin-top: 25px; border-top: 1px solid #333; padding-top: 15px; }
        .item { padding: 12px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .timer-text { color: #f90; font-weight: bold; }
        .copiar-btn { background: #333; color: white; border: none; padding: 8px 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2>GENERADOR DE KEY</h2>
    
    <div class="row">Años <button class="btn-pm" onclick="mod('anos',-1)">-</button><span class="val" id="anos">0</span><button class="btn-pm" onclick="mod('anos',1)">+</button></div>
    <div class="row">Meses <button class="btn-pm" onclick="mod('meses',-1)">-</button><span class="val" id="meses">0</span><button class="btn-pm" onclick="mod('meses',1)">+</button></div>
    <div class="row">Semanas <button class="btn-pm" onclick="mod('semanas',-1)">-</button><span class="val" id="semanas">0</span><button class="btn-pm" onclick="mod('semanas',1)">+</button></div>
    <div class="row">Días <button class="btn-pm" onclick="mod('dias',-1)">-</button><span class="val" id="dias">0</span><button class="btn-pm" onclick="mod('dias',1)">+</button></div>
    <div class="row">Minutos <button class="btn-pm" onclick="mod('minutos',-1)">-</button><span class="val" id="minutos">0</span><button class="btn-pm" onclick="mod('minutos',1)">+</button></div>
    <div class="row">Segundos <button class="btn-pm" onclick="mod('segundos',-1)">-</button><span class="val" id="segundos">0</span><button class="btn-pm" onclick="mod('segundos',1)">+</button></div>
    
    <button class="gen-btn" onclick="generar()">GENERAR Y ACTIVAR RELOJ</button>

    <div class="historial" id="lista"></div>
</div>

<script>
    let config = { anos:0, meses:0, semanas:0, dias:0, minutos:0, segundos:0 };

    function mod(id, v) {
        config[id] = Math.max(0, config[id] + v);
        document.getElementById(id).innerText = config[id];
    }

    function generar() {
        let totalMs = (config.anos * 31536000000) + (config.meses * 2592000000) + (config.semanas * 604800000) + (config.dias * 86400000) + (config.minutos * 60000) + (config.segundos * 1000);
        if(totalMs <= 0) return alert("Selecciona tiempo");

        let fin = Date.now() + totalMs;
        let key = "APEX-" + Math.floor(1000 + Math.random() * 9000) + "-KEY";
        
        let div = document.createElement('div');
        div.className = 'item';
        let timerId = 'timer_' + Date.now();
        div.innerHTML = `<div><strong>${key}</strong><br><span id="${timerId}" class="timer-text">...</span></div>
                         <button class="copiar-btn" onclick="navigator.clipboard.writeText('${key}')">COPIAR</button>`;
        document.getElementById('lista').prepend(div);

        let interval = setInterval(() => {
            let diff = fin - Date.now();
            if(diff <= 0) {
                clearInterval(interval);
                document.getElementById(timerId).innerText = "¡PARCHADO!";
                document.getElementById(timerId).style.color = "#f00";
            } else {
                let d = Math.floor(diff / 86400000);
                let h = Math.floor((diff % 86400000) / 3600000);
                let m = Math.floor((diff % 3600000) / 60000);
                let s = Math.floor((diff % 60000) / 1000);
                document.getElementById(timerId).innerText = `${d}d ${h}h ${m}m ${s}s`;
            }
        }, 1000);

        config = { anos:0, meses:0, semanas:0, dias:0, minutos:0, segundos:0 };
        document.querySelectorAll('.val').forEach(el => el.innerText = 0);
    }
</script>
</body>
</html>
