<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Unitaria</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }
        .wrapper {
            border: 1px solid #222;
            border-radius: 25px;
            padding: 20px;
            max-width: 360px;
            width: 100%;
            background-color: #000000;
        }
        .header-badge {
            border: 1px solid #ff4500;
            background-color: rgba(255, 69, 0, 0.1);
            border-radius: 20px;
            padding: 6px 16px;
            display: inline-block;
            font-size: 11px;
            font-weight: bold;
            color: #ff4500;
            margin: 10px auto 20px auto;
            letter-spacing: 0.5px;
        }
        .badge-container {
            text-align: center;
        }
        h2 {
            color: #00ea9c;
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 25px 0;
            text-align: center;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding: 0 10px;
        }
        .row span {
            color: #8a8a8f;
            font-size: 15px;
            max-width: 120px;
            text-align: left;
            line-height: 1.2;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-counter {
            background-color: #2c2c2e;
            border: none;
            color: #00ea9c;
            font-size: 20px;
            font-weight: bold;
            width: 40px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-counter.minus {
            color: #ff453a;
        }
        .value-box {
            background-color: #000000;
            border: 1px solid #2c2c2e;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            width: 70px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .key-display {
            background-color: #000000;
            border: 1px dashed #2c2c2e;
            border-radius: 8px;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #00ff00;
            text-align: center;
            margin: 25px 10px 10px 10px;
            letter-spacing: 0.5px;
        }
        .status-text {
            color: #8a8a8f;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-main {
            background-color: #008744;
            color: #ffffff;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 94%;
            margin: 0 auto 15px auto;
            display: block;
        }
        .divider {
            border-top: 1px solid #1c1c1e;
            margin: 20px 10px;
        }
        .footer-title {
            color: #ff9500;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
        }
        .select-box {
            background-color: #2c2c2e;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            width: 94%;
            margin: 0 auto 12px auto;
            display: block;
            font-size: 14px;
            font-family: inherit;
        }
        .btn-download {
            background-color: #ff4500;
            color: #ffffff;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 94%;
            margin: 0 auto 10px auto;
            display: block;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="badge-container">
        <div class="header-badge" id="topBadge">MOTOR MASIVO V3.5</div>
    </div>
    
    <h2>Generador Unitaria</h2>

    <div class="row">
        <span>Años adicionales</span>
        <div class="controls">
            <button class="btn-counter minus" onclick="change('year', -1)">-</button>
            <div class="value-box" id="year">0</div>
            <button class="btn-counter" onclick="change('year', 1)">+</button>
        </div>
    </div>

    <div class="row">
        <span>Meses adicionales</span>
        <div class="controls">
            <button class="btn-counter minus" onclick="change('month', -1)">-</button>
            <div class="value-box" id="month">0</div>
            <button class="btn-counter" onclick="change('month', 1)">+</button>
        </div>
    </div>

    <div class="row">
        <span>Semanas adicionales</span>
        <div class="controls">
            <button class="btn-counter minus" onclick="change('week', -1)">-</button>
            <div class="value-box" id="week">0</div>
            <button class="btn-counter" onclick="change('week', 1)">+</button>
        </div>
    </div>

    <div class="row">
        <span>Días adicionales</span>
        <div class="controls">
            <button class="btn-counter minus" onclick="change('day', -1)">-</button>
            <div class="value-box" id="day">0</div>
            <button class="btn-counter" onclick="change('day', 1)">+</button>
        </div>
    </div>

    <div class="key-display" id="keyDisplay">APEX-15684-KEY</div>
    <div class="status-text" id="statusText">Listo.</div>

    <button class="btn-main" onclick="generarYCopiar()">Generar Una Contraseña</button>

    <div class="divider"></div>

    <div class="footer-title">Generador de Packs Masivos</div>
    
    <select class="select-box">
        <option>Generar Pack de 100 días futuros</option>
    </select>

    <button class="btn-download">Descargar Pack (.txt)</button>
</div>

<script>
    let config = { year: 0, month: 0, week: 0, day: 0 };

    function change(type, val) {
        config[type] = Math.max(0, config[type] + val);
        document.getElementById(type).innerText = config[type];
        calcularKeyDinamica();
    }

    function calcularKeyDinamica() {
        let ahora = new Date();
        
        let year = ahora.getUTCFullYear() + config.year;
        let month = ahora.getUTCMonth() + config.month;
        let day = ahora.getUTCDate() + config.day + (config.week * 7);
        
        let secret = Math.floor((year + month + day) * 7.7);
        let laKey = "APEX-" + secret + "-KEY";
        
        document.getElementById("keyDisplay").innerText = laKey;

        let badge = document.getElementById("topBadge");
        let info = document.getElementById("statusText");

        // Verificamos si los contadores están en 0 (Clave normal del día)
        if (config.year === 0 && config.month === 0 && config.week === 0 && config.day === 0) {
            let tiempoLimite = new Date(Date.UTC(ahora.getUTCFullYear(), ahora.getUTCMonth(), ahora.getUTCDate() + 1));
            let dif = tiempoLimite - ahora;
            
            let horas = Math.floor(dif / (1000 * 60 * 60));
            let minutos = Math.floor((dif % (1000 * 60 * 60)) / (1000 * 60));

            badge.innerText = "MOTOR MASIVO V3.5";
            badge.style.color = "#ff4500";
            badge.style.borderColor = "#ff4500";
            badge.style.backgroundColor = "rgba(255, 69, 0, 0.1)";
            info.innerText = `Esta Key se parcha en: ${horas}h y ${minutos}m.`;
            info.style.color = "#ff9500";
        } else {
            // Si el creador modificó los botones para dar más tiempo
            badge.innerText = "SISTEMA EXTENDIDO VIP";
            badge.style.color = "#00ffcc";
            badge.style.borderColor = "#00ffcc";
            badge.style.backgroundColor = "rgba(0, 255, 204, 0.1)";
            info.innerText = "Llave especial de larga duración generada.";
            info.style.color = "#00ff00";
        }
    }

    function generarYCopiar() {
        let text = document.getElementById("keyDisplay").innerText;
        navigator.clipboard.writeText(text);
        
        let info = document.getElementById("statusText");
        let originalText = info.innerText;
        info.innerText = "¡Contraseña Copiada al Portapapeles!";
        info.style.color = "#00ff00";
        
        setTimeout(() => {
            calcularKeyDinamica();
        }, 2000);
    }

    // Actualizar el segundero/minutero cada 30 segundos de forma automática
    setInterval(calcularKeyDinamica, 30000);
    calcularKeyDinamica();
</script>

</body>
</html>
