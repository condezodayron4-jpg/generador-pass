<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; justify-content: center; padding: 20px; }
        .box { width: 350px; background: #111; border: 1px solid #444; padding: 20px; border-radius: 15px; }
        .row { display: flex; justify-content: space-between; margin: 10px 0; align-items: center; }
        .val { background: #000; padding: 10px; border: 1px solid #555; width: 50px; text-align: center; }
        .gen-btn { background: #080; width: 100%; padding: 15px; border: none; color: #fff; font-weight: bold; cursor: pointer; }
        .historial { height: 300px; overflow-y: scroll; margin-top: 20px; border-top: 1px solid #333; }
        .item { padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .timer-text { color: #f90; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Generador Unitaria</h2>
    <div class="row">Años <button onclick="mod('anos',-1)">-</button><span class="val" id="anos">0</span><button onclick="mod('anos',1)">+</button></div>
    <div class="row">Meses <button onclick="mod('meses',-1)">-</button><span class="val" id="meses">0</span><button onclick="mod('meses',1)">+</button></div>
    <div class="row">Semanas <button onclick="mod('semanas',-1)">-</button><span class="val" id="semanas">0</span><button onclick="mod('semanas',1)">+</button></div>
    <div class="row">Días <button onclick="mod('dias',-1)">-</button><span class="val" id="dias">0</span><button onclick="mod('dias',1)">+</button></div>
    
    <button class="gen-btn" onclick="generar()">GENERAR Y ACTIVAR RELOJ</button>

    <div class="historial" id="lista"></div>
</div>

<script>
    let config = { anos:0, meses:0, semanas:0, dias:0 };

    function mod(id, v) {
        config[id] = Math.max(0, config[id] + v);
        document.getElementById(id).innerText = config[id];
    }

    function generar() {
        let totalMs = (config.anos * 31536000000) + (config.meses * 2592000000) + (config.semanas * 604800000) + (config.dias * 86400000);
        if(totalMs <= 0) return alert("Selecciona tiempo");

        let fin = Date.now() + totalMs;
        let key = "APEX-" + Math.floor(1000 + Math.random() * 9000) + "-KEY";
        
        let div = document.createElement('div');
        div.className = 'item';
        let timerId = 'timer_' + Date.now();
        div.innerHTML = `<div><strong>${key}</strong><br><span id="${timerId}" class="timer-text">...</span></div>
                         <button onclick="navigator.clipboard.writeText('${key}')">COPIAR</button>`;
        document.getElementById('lista').prepend(div);

        // Reloj que disminuye
        let interval = setInterval(() => {
            let diff = fin - Date.now();
            if(diff <= 0) {
                clearInterval(interval);
                document.getElementById(timerId).innerText = "¡PARCHADO!";
                document.getElementById(timerId).style.color = "#f00";
            } else {
                let h = Math.floor(diff / 3600000);
                let m = Math.floor((diff % 3600000) / 60000);
                let s = Math.floor((diff % 60000) / 1000);
                document.getElementById(timerId).innerText = `${h}h ${m}m ${s}s`;
            }
        }, 1000);

        // Reset inputs
        config = { anos:0, meses:0, semanas:0, dias:0 };
        document.querySelectorAll('.val').forEach(el => el.innerText = 0);
    }
</script>
</body>
</html>
