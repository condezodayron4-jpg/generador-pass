<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Unitaria V3.5</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .wrapper { border: 1px solid #333; border-radius: 20px; padding: 25px; width: 320px; background: #0a0a0a; text-align: center; }
        .row { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }
        .btn-counter { background: #222; border: 1px solid #444; color: #0f0; width: 40px; height: 35px; border-radius: 5px; cursor: pointer; }
        .value-box { background: #000; border: 1px solid #333; width: 60px; height: 35px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .key-display { font-size: 20px; color: #555; margin: 20px 0; border: 1px dashed #333; padding: 10px; font-family: monospace; }
        .timer { font-size: 18px; color: #555; font-weight: bold; margin-bottom: 20px; }
        .btn-gen { background: #080; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>Generador Unitaria</h2>
    <div id="controles">
        <div class="row"><span>Años</span><div class="controls"><button class="btn-counter" onclick="cambiar('year', -1)">-</button><span class="value-box" id="year">0</span><button class="btn-counter" onclick="cambiar('year', 1)">+</button></div></div>
        <div class="row"><span>Meses</span><div class="controls"><button class="btn-counter" onclick="cambiar('month', -1)">-</button><span class="value-box" id="month">0</span><button class="btn-counter" onclick="cambiar('month', 1)">+</button></div></div>
        <div class="row"><span>Semanas</span><div class="controls"><button class="btn-counter" onclick="cambiar('week', -1)">-</button><span class="value-box" id="week">0</span><button class="btn-counter" onclick="cambiar('week', 1)">+</button></div></div>
        <div class="row"><span>Días</span><div class="controls"><button class="btn-counter" onclick="cambiar('day', -1)">-</button><span class="value-box" id="day">0</span><button class="btn-counter" onclick="cambiar('day', 1)">+</button></div></div>
    </div>

    <div class="key-display" id="keyDisplay">APEX-00000000-KEY</div>
    <div class="timer" id="timer">00d 00h 00m 00s</div>
    <button class="btn-gen" onclick="generar()">GENERAR Y ACTIVAR</button>
</div>

<script>
    let config = { year: 0, month: 0, week: 0, day: 0 };
    let intervaloTimer = null;

    function cambiar(type, val) {
        config[type] = Math.max(0, config[type] + val);
        document.getElementById(type).innerText = config[type];
        
        // Reset visual si todo vuelve a cero
        if (config.year === 0 && config.month === 0 && config.week === 0 && config.day === 0) {
            clearInterval(intervaloTimer);
            document.getElementById("keyDisplay").innerText = "APEX-00000000-KEY";
            document.getElementById("keyDisplay").style.color = "#555";
            document.getElementById("timer").innerText = "00d 00h 00m 00s";
            document.getElementById("timer").style.color = "#555";
        }
    }

    function generar() {
        let totalMs = (config.year * 31536000000) + (config.month * 2592000000) + (config.week * 604800000) + (config.day * 86400000);
        
        if (totalMs === 0) { alert("¡Selecciona tiempo!"); return; }

        // 1. Generar Key "Infinitamente" única
        // Usamos una cadena aleatoria compleja
        let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let randomKey = "";
        for (let i = 0; i < 8; i++) randomKey += chars.charAt(Math.floor(Math.random() * chars.length));
        
        let display = document.getElementById("keyDisplay");
        display.innerText = "APEX-" + randomKey + "-KEY";
        display.style.color = "#0f0"; // Verde activo

        // 2. Iniciar Timer regresivo único
        let fechaFin = Date.now() + totalMs;
        let timerDisplay = document.getElementById("timer");
        timerDisplay.style.color = "#f90"; // Naranja activo

        if (intervaloTimer) clearInterval(intervaloTimer);
        
        intervaloTimer = setInterval(() => {
            let resta = fechaFin - Date.now();
            if (resta <= 0) {
                clearInterval(intervaloTimer);
                timerDisplay.innerText = "¡PARCHADO!";
                display.style.color = "#555";
            } else {
                let d = Math.floor(resta / 86400000);
                let h = Math.floor((resta % 86400000) / 3600000);
                let m = Math.floor((resta % 3600000) / 60000);
                let s = Math.floor((resta % 60000) / 1000);
                timerDisplay.innerText = `${d}d ${h}h ${m}m ${s}s`;
            }
        }, 1000);
    }
</script>
</body>
</html>
