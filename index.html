<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Keys - Official Apex Cheaters</title>
    <style>
        body {
            background-color: #13131a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
        }
        .container {
            background-color: #1c1c24;
            border: 2px solid #8a2be2;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #8a2be2; margin-bottom: 5px; }
        p { color: #aaaaaa; }
        .key-box {
            background-color: #282836;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #00ff00;
            border-radius: 5px;
            margin: 20px 0;
            letter-spacing: 1px;
        }
        button {
            background-color: #8a2be2;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #a043f7; }
    </style>
</head>
<body>

<div class="container">
    <h1>Apex Cheaters</h1>
    <p>Tu clave de acceso para el script de hoy:</p>
    <div class="key-box" id="keyDisplay">Cargando...</div>
    <button onclick="copyKey()">Copiar Key</button>
</div>

<script>
    function generarKey() {
        const ahora = new Date();
        const year = ahora.getUTCFullYear();
        const month = ahora.getUTCMonth(); 
        const day = ahora.getUTCDate();
        
        // Mismo cálculo matemático que usa tu script de Roblox
        const secret = Math.floor((year + month + day) * 7.7);
        document.getElementById('keyDisplay').innerText = "APEX-" + secret + "-KEY";
    }

    function copyKey() {
        const text = document.getElementById('keyDisplay').innerText;
        navigator.clipboard.writeText(text);
        alert("¡Key copiada al portapapeles!");
    }

    generarKey();
</script>

</body>
</html>
