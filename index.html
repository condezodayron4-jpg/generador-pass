<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Ultra Masivo Pro</title>
    <style>
        body {
            background-color: #111111;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
        }
        .badge {
            background-color: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
        h2 { color: #00ffcc; margin-top: 0; margin-bottom: 25px; font-size: 24px; }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #222222;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .row span { color: #b3b3b3; font-size: 16px; font-weight: bold; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-counter {
            background-color: #2d2d2d;
            border: 1px solid #444;
            color: #00ffcc;
            font-size: 18px;
            font-weight: bold;
            width: 35px;
            height: 35px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-counter.minus { color: #ff4444; }
        .value-display { font-size: 18px; font-weight: bold; width: 30px; text-align: center; }
        
        .key-box {
            background-color: #282836;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            color: #00ff00;
            border-radius: 8px;
            margin: 20px 0 10px 0;
            letter-spacing: 1px;
            border: 1px dashed #00ff00;
        }
        .timer-box {
            font-size: 13px;
            color: #ffcc00;
            margin-bottom: 20px;
            font-style: italic;
        }
        .btn-main {
            background-color: #00ea9c;
            color: #111;
            border: none;
            padding: 14px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .btn-main:hover { background-color: #00ffcc; }
    </style>
</head>
<body>

<div class="container">
    <div class="badge" id="topBadge">MOTOR MASIVO V3.5</div>
    <h2>Generador Unitaria</h2>

    <div class="row"><span>Años adicionales</span><div class="controls"><button class="btn-counter minus" onclick="change('year',-1)">-</button><div class="value-display" id="year">0</div><button class="btn-counter" onclick="change('year',1)">+</button></div></div>
    <div class="row"><span>Meses adicionales</span><div class="controls"><button class="btn-counter minus" onclick="change('month',-1)">-</button><div class="value-display" id="month">0</div><button class="btn-counter" onclick="change('month',1)">+</button></div></div>
    <div class="row"><span>Semanas adicionales</span><div class="controls"><button class="btn-counter minus" onclick="change('week',-1)">-</button><div class="value-display" id="week">0</div><button class="btn-counter" onclick="change('week',1)">+</button></div></div>
    <div class="row"><span>Días adicionales</span><div class="controls"><button class="btn-counter minus" onclick="change('day',-1)">-</button><div class="value-display" id="day">0</div><button class="btn-counter" onclick="change('day',1)">+</button></div></div>

    <div class="key-box" id="keyDisplay">APEX-CARGANDO-KEY</div>
    <div class="timer-box" id="timerDisplay">Calculando tiempo de vida...</div>

    <button class="btn-main" onclick="copiarKey()">Copiar Contraseña / Key</button>
</div>

<script>
    let config = { year: 0, month: 0, week: 0, day: 0 };

    function change(type, val) {
        config[type] = Math.max(0, config[type] + val);
        document.getElementById(type).innerText = config[type];
        generarKey();
    }

    function generarKey() {
        let ahora = new Date();
        
        // Sumar los valores adicionales elegidos por el usuario
        let year = ahora.getUTCFullYear() + config.year;
        let month = ahora.getUTCMonth() + config.month;
        let day = ahora.getUTCDate() + config.day + (config.week * 7);
        
        let secret = Math.floor((year + month + day) * 7.7);
        
        let linkBadge = document.getElementById("topBadge");
        let timerText = document.getElementById("timerDisplay");

        // Si todos los selectores están en 0, significa clave del día actual (vence en 24h)
        if(config.year === 0 && config.month === 0 && config.week === 0 && config.day === 0) {
            let tiempoRestanteMs = new Date(Date.UTC(ahora.getUTCFullYear(), ahora.getUTCMonth(), ahora.getUTCDate() + 1)) - ahora;
            let horas = Math.floor(tiempoRestanteMs / (1000 * 60 * 60));
            let minutos = Math.floor((tiempoRestanteMs % (1000 * 60 * 60)) / (1000 * 60));
            
            linkBadge.innerText = "CLAVE DEL DÍA (ACTIVA)";
            linkBadge.style.borderColor = "#00ffcc";
            linkBadge.style.color = "#00ffcc";
            timerText.innerText = `Esta Key caduca y se parcha en: ${horas}h ${minutos}m`;
            document.getElementById("keyDisplay").innerText = "APEX-" + secret + "-KEY";
        } else {
            // Claves extendidas del creador
            linkBadge.innerText = "MOTOR MASIVO V3.5 (EXTENDIDO)";
            linkBadge.style.borderColor = "#ffcc00";
            linkBadge.style.color = "#ffcc00";
            timerText.innerText = "Llave premium de larga duración activa.";
            document.getElementById("keyDisplay").innerText = "APEX-" + secret + "-KEY";
        }
    }

    function copiarKey() {
        let text = document.getElementById("keyDisplay").innerText;
        navigator.clipboard.writeText(text);
        alert("¡Key copiada con éxito!");
    }

    // Ejecutar contador en tiempo real cada minuto
    setInterval(generarKey, 60000);
    generarKey();
</script>
</body>
</html>
